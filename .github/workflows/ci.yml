name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install jq
        run: sudo apt-get update -y && sudo apt-get install -y jq

      - name: Validate JSON
        run: |
          set -e
          for j in opencode.json .planning/config.json \
                   skills/setup-opencode-agenticapps-workflow/snapshot/planning-config.json; do
            jq -e . "$j" >/dev/null && echo "valid: $j"
          done

      - name: Shell syntax check
        run: |
          set -e
          for s in install.sh migrations/check-snapshot-parity.sh migrations/run-tests.sh \
                   bin/openspec-change-gate.sh bin/reviewer-cli.sh bin/git-hooks/pre-commit; do
            bash -n "$s" && echo "ok: $s"
          done

      - name: Snapshot drift guard
        run: bash migrations/check-snapshot-parity.sh

      - name: Migration tests
        run: bash migrations/run-tests.sh

      - name: No residual Codex HOST bindings in load-bearing files
        run: |
          set -e
          # Host-binding patterns only. `codex` as an external-vendor REVIEWER
          # CLI (§18 multi-AI review) is legitimate, so the CLI-invocation forms
          # (`codex --version`, `command -v codex`) are intentionally NOT matched.
          hits=$(grep -rniE '\.codex/|CODEX_HOME|CODEX_SKILLS|"host": *"codex"' \
            AGENTS.md install.sh opencode.json .opencode/ \
            skills/ migrations/*.md .planning/config.json 2>/dev/null \
            | grep -v 'check-snapshot-parity' || true)
          if [ -n "$hits" ]; then
            echo "Found residual Codex host bindings:"; echo "$hits"; exit 1
          fi
          echo "clean: no residual Codex bindings"

      - name: No residual gitnexus in load-bearing files
        run: |
          set -e
          # Scoped to LIVE surfaces only. Historical records (migrations/*.md,
          # docs/decisions/*, CHANGELOG, the region-placement design doc) retain
          # their gitnexus references per §08 supersede-don't-delete, and
          # .opencode/session-handoff.md is a gitignored working artifact.
          hits=$(grep -rniE 'gitnexus' \
            AGENTS.md CLAUDE.md install.sh opencode.json \
            skills/ bin/ .planning/config.json 2>/dev/null || true)
          if [ -n "$hits" ]; then
            echo "Found residual gitnexus in live surfaces:"; echo "$hits"; exit 1
          fi
          echo "clean: no residual gitnexus in live surfaces"
